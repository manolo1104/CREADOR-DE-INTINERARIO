name: Blog Agent — Publicación Diaria

on:
  schedule:
    - cron: "0 13 * * *"  # 8:00 AM hora México (UTC-5) todos los días
  workflow_dispatch:
    inputs:
      topic:
        description: "Tema personalizado (opcional)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no publica)"
        type: boolean
        default: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: blog-agent
        run: npm install

      - name: Generate and publish blog post
        working-directory: blog-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_AGENT_SECRET: ${{ secrets.BLOG_AGENT_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://creador-de-intinerario-production.up.railway.app' }}
        run: |
          ARGS=()
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ARGS+=(--dry-run)
          fi
          if [[ -n "${{ github.event.inputs.topic }}" ]]; then
            ARGS+=(--topic "${{ github.event.inputs.topic }}")
          fi
          node index.js "${ARGS[@]}"
