name: Blog Agent — Publicación Diaria

on:
  push:
    branches:
      - main
    paths:
      - blog-agent/index.js
      - blog-agent/content-strategy.js
      - blog-agent/*.json
      - .github/workflows/blog-agent.yml
  schedule:
    - cron: "0 14 * * *"  # 8:00 AM hora CDMX (UTC-6) todos los días
  workflow_dispatch:
    inputs:
      topic:
        description: "Tema personalizado (opcional)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (no publica)"
        type: boolean
        default: false

jobs:
  generate-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: blog-agent/package.json

      - name: Install dependencies
        working-directory: blog-agent
        run: npm install

      - name: Generate and publish blog post
        working-directory: blog-agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_AGENT_SECRET: ${{ secrets.BLOG_AGENT_SECRET }}
          SITE_URL: 'https://www.huasteca-potosina.com'
          GITHUB_REPO_NAME: ${{ github.repository }}
        run: |
          ARGS=""
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ github.event.inputs.topic }}" ]]; then
            ARGS="$ARGS --topic '${{ github.event.inputs.topic }}'"
          fi
          node index.js $ARGS
